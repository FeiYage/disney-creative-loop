# 迪士尼创意引擎 Skill 全局配置
skill:
  name: "Disney Creative Loop"
  id: "disney_creative_loop_v1"
  version: "1.0"
  
# 循环参数（可按需调整）
loop:
  target_score: 9.0          # 目标分数，达到后自动停止
  max_iterations: 5          # 最大循环次数，防止无限制运行
  min_score_improvement: 0.3 # 连续两次迭代最低提升幅度要求
  
# 角色配置
roles:
  dreamer:
    agent_file: "agents/dreamer.md"
    output_prefix: "[梦想家/Dreamer]"
    
  realist:
    agent_file: "agents/realist.md"
    output_prefix: "[实干家/Realist]"
    
  critic:
    agent_file: "agents/critic.md"
    output_prefix: "[批评家/Critic]"
    
# 触发匹配规则
trigger_match:
  keywords: ["脑暴", "头脑风暴", "创意方案", "帮我策划", "点子打磨", "迪士尼"]
  # 可选：指定 Agent 名称触发
  agents: []